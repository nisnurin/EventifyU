name: eventifyu
description: "A new Flutter project."
publish_to: 'none' # Prevents accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Production dependencies
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0

  pdf: ^3.11.0
  printing: ^5.13.0

  flutter_local_notifications: ^17.0.0
  image_picker: ^1.2.2
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
    

  # Standard linting rules for codebase quality
  flutter_lints: ^6.0.0

flutter:
  # Enables the inclusion of Material Design icons and fonts
  uses-material-design: true

  # Registered assets directories for the application
  assets:
  - lib/features/assets/dashboard/